/* ---------------- WOBBLE ENGINE ---------------- */
function startWobble() {
    clearInterval(wobbleInterval);

    wobbleInterval = setInterval(() => {
        const t = Date.now();

        const rot = Math.sin(t / 50) * 18;
        const scale = 1 + Math.sin(t / 90) * 0.06;

        wrap2.style.transform = `rotate(${rot}deg) scale(${scale})`;

    }, 16);
}

function stopWobble() {
    clearInterval(wobbleInterval);
    wrap2.style.transform = "rotate(0deg) scale(1)";
}

/* ---------------- BUTTON 2 ---------------- */
wrap2.onclick = () => {

    if (!audio2) {
        audio2 = new Audio(sound2);
    }

    audio2.currentTime = 0;
    audio2.play();

    startWobble();

    audio2.onended = () => {
        stopWobble();
    };
};
